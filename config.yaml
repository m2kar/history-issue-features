# -- 运行控制 --
timeout: 600                          # 单 issue 超时 (秒)
subagent_parallelism: 2               # 每个 issue 内 extractor 并行度

# -- 数据源 --
repos:
  verilator: "verilator/verilator"
  circt: "llvm/circt"

# -- 爬取控制 --
crawl:
  rate_limit: 2000                    # 每小时最大请求数
  sleep_interval: 1.8                 # 每次 API 请求间隔 (秒)
  baseline_dir: "/edazz/mirtl-pocs/issues"   # 基线数据目录

# -- 输出路径 --
edazz_output: /edazz/EDAzz/data/feature_sources/history_v2/merged_history_v2_features.json

# -- Provider 配置 --
providers:
  - name: "kimi3"
    env:
      EDA_BUG_CONFIG_NAME: "kimi3"
      ENABLE_TOOL_SEARCH: "false"
      ANTHROPIC_BASE_URL: "https://api.kimi.com/coding/"
      ANTHROPIC_AUTH_TOKEN: "sk-kimi-MdmYdEe1r3CxecCp1ztQjbCSXKeAyCWzda3GGwp83RKjsbo8GUSQkPsWT9YZHYEn"
      API_TIMEOUT_MS: "3000000"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

